<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYRAX GAME CLUB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,sans-serif;background:#0b0f1a;color:#fff;line-height:1.8}
.hero{text-align:center;padding:90px 20px;background:linear-gradient(135deg,#00c3ff,#00ff95,#ffe600);color:#000}
.container{width:90%;max-width:1200px;margin:auto}
.section{padding:60px 0}
.section h2{text-align:center;margin-bottom:35px;color:#00ff95}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.card{width:280px;background:#111827;border:1px solid #00ff95;border-radius:20px;padding:25px;text-align:center}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.badge{padding:10px 18px;border-radius:30px;color:#000;font-weight:bold;background:linear-gradient(90deg,#00c3ff,#00ff95,#ffe600)}
.gallery-button{display:block;width:280px;margin:30px auto;padding:15px;border:none;border-radius:15px;background:linear-gradient(90deg,#00c3ff,#00ff95,#ffe600);font-weight:bold}
.gallery-section{display:block} /* گالری همیشه نمایش داده شود */
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.gallery img{width:100%;height:280px;object-fit:cover;border-radius:20px;border:2px solid #00ff95}
.info-box{background:#111827;border:1px solid #00ff95;border-radius:20px;padding:30px;max-width:900px;margin:auto}
.footer{text-align:center;padding:30px;border-top:1px solid #00ff95;background:#0f172a}
</style>
</head>
<body>

<section class="hero">
<h1>🎮 CYRAX GAME CLUB</h1>
<p>زندگی یک بازی است؛ سطح خودت را ارتقا بده</p>
</section>

<section class="section"><div class="container">
<h2>🔥 امکانات مجموعه</h2>
<div class="cards">
<div class="card">🎮 PlayStation 5</div>
<div class="card">🖥️ Gaming PC</div>
<div class="card">👑 اتاق VIP</div>
<div class="card">📺 تلویزیون 75 اینچ</div>
<div class="card">🔊 سیستم صوتی حرفه‌ای</div>
<div class="card">⚡ اینترنت پرسرعت</div>
</div>
</div></section>

<section class="section"><div class="container">
<h2>⭐ ویژگی‌ها</h2>
<div class="badges">
<span class="badge">PS5</span>
<span class="badge">Gaming PC</span>
<span class="badge">VIP Rooms</span>
</div>
</div></section>

<section class="section"><div class="container">
<h2>📸 گالری عکس مجموعه</h2>

<div id="gallerySection" class="gallery-section">
<div class="gallery">
<img src="https://i.ibb.co/pjFLkwqq/photo1.jpg" alt="1">
<img src="https://i.ibb.co/B5D3VQ0k/photo2.jpg" alt="2">

<img src="https://i.ibb.co/QjtjCY9q/photo4.jpg" alt="4">
<img src="https://i.ibb.co/B2n0YNFY/photo5.jpg" alt="5">
<img src="https://i.ibb.co/fz560TyT/photo6.jpg" alt="6">
</div>
</div>

</div></section>

<section class="section"><div class="container">
<h2>📍 اطلاعات تماس</h2>
<div class="info-box">
<p>تلفن: 09173115680</p>
<p>اینستاگرام: @game_club_cyrax</p>
</div>
</div></section>

</body>
</html>
