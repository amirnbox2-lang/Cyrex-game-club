<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYRAX GAME CLUB | کلاب حرفه‌ای گیمینگ شیراز</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,sans-serif;background:#0b0f1a;color:#fff;line-height:1.8}
.hero{text-align:center;padding:90px 20px;background:linear-gradient(135deg,#00c3ff,#00ff95,#ffe600);color:#000}
.hero h1{font-size:52px;margin-bottom:15px}
.hero p{font-size:20px;font-weight:bold}
.container{width:90%;max-width:1200px;margin:auto}
.section{padding:60px 0;animation:fadeUp .8s ease}
.section h2{text-align:center;margin-bottom:35px;color:#00ff95}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.card{width:280px;background:#111827;border:1px solid #00ff95;border-radius:20px;padding:25px;text-align:center;transition:.3s;box-shadow:0 0 15px rgba(0,255,149,.15)}
.card:hover{transform:translateY(-8px);box-shadow:0 0 30px rgba(0,255,149,.6)}
.card h3{color:#00ff95;margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.badge{padding:10px 18px;border-radius:30px;color:#000;font-weight:bold;background:linear-gradient(90deg,#00c3ff,#00ff95,#ffe600)}
.gallery-button{display:block;width:280px;margin:30px auto;padding:15px;border:none;border-radius:15px;background:linear-gradient(90deg,#00c3ff,#00ff95,#ffe600);color:#000;font-size:18px;font-weight:bold;cursor:pointer}
.gallery-section{display:none}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.gallery img{width:100%;height:280px;object-fit:cover;border-radius:20px;border:2px solid #00ff95;box-shadow:0 0 15px rgba(0,255,149,.2);cursor:pointer}
.info-box{background:#111827;border:1px solid #00ff95;border-radius:20px;padding:30px;max-width:900px;margin:auto}
.footer{margin-top:50px;text-align:center;padding:30px;border-top:1px solid #00ff95;background:#0f172a}
input,select{width:100%;padding:12px;border-radius:10px;border:none}
.btn{width:100%;padding:15px;background:#00ff95;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn-wa{background:#25D366;color:#fff}
.btn-call{background:#00c3ff;color:#000}
.btn-insta{background:#E1306C;color:#fff}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);justify-content:center;align-items:center;flex-direction:column;z-index:999}
.popup img{max-width:90%;max-height:80%;border-radius:15px}
.close{margin-top:15px;background:#ff004c;border:none;padding:10px 20px;color:#fff;border-radius:10px;cursor:pointer}
.floating-wa{position:fixed;bottom:20px;left:20px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;text-decoration:none;z-index:9999}
a{color:#00ff95;text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.floating-menu{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column-reverse;align-items:flex-start}
.floating-main{width:60px;height:60px;border:none;border-radius:50%;background:#25D366;font-size:30px;cursor:pointer}
.menu-items{display:none;flex-direction:column;gap:10px;margin-bottom:10px}
.social-btn{width:150px;padding:12px;border-radius:15px;text-align:center;font-weight:bold;text-decoration:none;color:#fff}
.wa{background:#25D366}
.insta{background:#E1306C}
.sms{background:#00c3ff;color:#000}


.games-toggle{width:100%;background:#111827;border:1px solid #00ff95;color:#fff;padding:18px 20px;border-radius:15px;font-size:20px;font-weight:bold;cursor:pointer;margin-bottom:15px;text-align:right}
.games-content{display:none;background:#111827;border:1px solid #00ff95;border-radius:20px;padding:20px;margin-bottom:20px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.game-item{background:#0f172a;padding:12px 15px;border-radius:12px;border-right:4px solid #00ff95}


canvas#bgParticles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
#splashScreen{
position:fixed;inset:0;background:#050814;
display:flex;flex-direction:column;justify-content:center;align-items:center;
z-index:999999;
}
#splashScreen img{
width:220px;height:220px;border-radius:50%;
box-shadow:0 0 25px #00ff95,0 0 60px #00c3ff,0 0 100px #00ff95;
animation:logoZoom 1.8s ease-in-out infinite alternate;
}
#splashScreen h1{margin-top:20px;color:#fff;text-shadow:0 0 20px #00ff95}
#splashScreen p{color:#00ff95;font-size:20px;font-weight:bold}
@keyframes logoZoom{from{transform:scale(1)}to{transform:scale(1.08)}}
@keyframes fadeSplash{to{opacity:0;visibility:hidden}}

</style>
